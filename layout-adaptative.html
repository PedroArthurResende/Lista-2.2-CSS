<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Adaptativo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .pagina {
      width: 850px;
      min-height: 600px;
      background: white;
      padding: 12px;
      display: grid;
      gap: 10px;
      grid-template-columns: 160px 1fr 130px;
      grid-template-rows: 70px 70px 1fr 60px 60px;
    }

    .bloco {
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      border: 3px solid white;
      text-align: center;
    }

    .header { grid-column: 1 / 4; background: #f2b705; }
    .banner { grid-column: 2 / 3; background: #e5493f; }
    .esquerda { grid-row: 2 / 5; background: #12a85b; }
    .direita { grid-column: 3; grid-row: 2 / 5; background: #f2b705; }
    .conteudo { grid-column: 2; grid-row: 3 / 4; background: #4385e7; color: #111; }
    .baixo { grid-column: 2; background: #12a85b; }
    .footer { grid-column: 1 / 4; background: #4385e7; }

    @media screen and (max-width: 500px) {
      body {
        align-items: flex-start;
      }

      .pagina {
        width: 100%;
        min-height: 850px;
        grid-template-columns: 1fr;
        grid-template-rows: 60px 60px 60px 1fr 60px 60px 60px;
      }

      .header,
      .banner,
      .esquerda,
      .direita,
      .conteudo,
      .baixo,
      .footer {
        grid-column: 1;
        grid-row: auto;
      }
    }
  </style>
</head>
<body>
  <div class="pagina">
    <header class="bloco header">Header</header>
    <div class="bloco banner">Banner</div>
    <aside class="bloco esquerda">Left Aside</aside>
    <main class="bloco conteudo">Main Content</main>
    <aside class="bloco direita">Right Aside</aside>
    <section class="bloco baixo">Low Content</section>
    <footer class="bloco footer">Footer</footer>
  </div>
</body>
</html>
