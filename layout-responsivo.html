<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 8 - Layout Responsivo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #eeeeee;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 25px;
    }

    .layout {
      width: 760px;
      min-height: 520px;
      background: white;
      padding: 10px;
      display: grid;
      gap: 8px;
      grid-template-columns: 150px 1fr 120px;
      grid-template-rows: 55px 65px 1fr 55px 55px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
    }

    .area {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-weight: bold;
      border: 2px solid #f8f8f8;
    }

    .topo { grid-column: 1 / 4; background: #f5b800; }
    .banner { grid-column: 2 / 3; background: #e9473f; }
    .menu { grid-row: 2 / 5; background: #0fa85a; }
    .lateral { grid-column: 3; grid-row: 2 / 5; background: #f5b800; }
    .principal { background: #4387e8; min-height: 260px; }
    .extra { background: #0fa85a; }
    .rodape { grid-column: 1 / 4; background: #4387e8; }

    @media screen and (max-width: 500px) {
      body {
        padding: 10px;
        align-items: flex-start;
      }

      .layout {
        width: 100%;
        min-height: 900px;
        grid-template-columns: 1fr;
        grid-template-rows: 55px 55px 55px 1fr 55px 55px 55px;
      }

      .topo,
      .banner,
      .menu,
      .lateral,
      .principal,
      .extra,
      .rodape {
        grid-column: 1;
        grid-row: auto;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <header class="area topo">Header</header>
    <section class="area banner">Banner</section>
    <aside class="area menu">Left Aside</aside>
    <main class="area principal">Main Content</main>
    <aside class="area lateral">Right Aside</aside>
    <section class="area extra">Low Content</section>
    <footer class="area rodape">Footer</footer>
  </div>
</body>
</html>
